name: Feature Request
description: 提出新功能、体验优化或工程改进建议
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      description: 先说明痛点，不要直接只写方案
      placeholder: 例如：当前资料专区缺少批量标签操作，导致资料整理效率较低
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明你希望如何实现，或者至少描述希望达到的效果
      placeholder: 例如：支持多选资源后统一设置分类、标签和置顶状态
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他做法，也欢迎补充
  - type: dropdown
    id: module
    attributes:
      label: 相关模块
      options:
        - 认证
        - 导师管理
        - 面试管理
        - 模板 / 标签
        - 文书 / 笔记编辑
        - 资料专区
        - 院校检索 / 官方源库
        - 论坛 / 提醒
        - 部署 / DevOps
        - 文档
        - 其他
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 价值判断
      options:
        - 高：会明显影响日常使用效率
        - 中：可提升体验，但有替代方案
        - 低：属于锦上添花
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经搜索过现有 Issue，确认这不是重复建议
          required: true
        - label: 这个建议与项目定位相关，而不是完全脱离当前产品边界
          required: true
